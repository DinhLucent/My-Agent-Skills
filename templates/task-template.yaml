# Task Entry Template
# Copy this into .hub/backlog.yaml when creating a new task
#
# Rules:
# - assigned_role MUST match an Agent ID from manifest.yaml exactly
# - acceptance_criteria MUST be clear and measurable
# - dependencies MUST list all Task IDs that need to be done first

- id: "TASK-xxx"
  title: ""
  description: |
    Detailed description of the task.
    Can be multiple lines.
  assigned_role: ""          # ← Agent ID from manifest.yaml
                              # e.g.: backend-agent, security-agent, cto-agent
  priority: "medium"          # critical | high | medium | low
  status: "todo"              # todo | claimed | in_progress | in_review | done | blocked
  dependencies: []            # ["TASK-001", "TASK-002"]
  created_at: ""              # ISO format: 2026-03-29T13:30:00
  created_by: ""              # user | producer-agent | cto-agent
  deadline: ""                # 2026-03-31
  acceptance_criteria:
    - "Criterion 1 — specific and measurable"
    - "Criterion 2"
  output_files: []            # Agent fills when completed
  notes: ""                   # Reference ADRs, design docs, etc.
