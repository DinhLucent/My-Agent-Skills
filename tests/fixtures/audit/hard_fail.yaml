# Audit Fixture: Hard Fail
# Scenario: Command always exits non-zero. Exhausts all retries and
#           triggers failure handoff.
# Run: python run_orchestrator.py run tests/fixtures/audit/hard_fail.yaml

schema_version: "2.1"
id: AUDIT-FAIL-001
title: "Deliberately failing task for handoff testing"
description: >
  Task whose commands always fail (exit 1). Designed to exhaust
  the retry budget and trigger the failure handoff path.
assigned_role: backend
priority: critical
status: queued
domain: general

inputs:
  related_paths:
    - runtime/sessions/audit_fail.txt
  related_tests: []
  related_handoffs: []
  related_logs: []
  related_modules: []

constraints:
  - no_data_loss

acceptance_criteria:
  - output file runtime/sessions/audit_fail.txt contains SUCCESS
  - this criteria is intentionally impossible to satisfy

metadata:
  fixture_type: hard_fail
  expected_outcome: failed_after_max_retries
  expected_attempts: 3
  expected_handoff_to: reviewer
  execution:
    primary_commands:
      - "New-Item -ItemType Directory -Path 'runtime/sessions' -Force | Out-Null; Set-Content -Path 'runtime/sessions/audit_fail.txt' -Value 'AUDIT-FAIL-001 — FAILED deliberately' -Encoding utf8; exit 1"
    retry_commands:
      - "Set-Content -Path 'runtime/sessions/audit_fail.txt' -Value 'AUDIT-FAIL-001 — still FAILED on retry' -Encoding utf8; exit 1"
    output_files:
      - runtime/sessions/audit_fail.txt
    satisfied_criteria: []
