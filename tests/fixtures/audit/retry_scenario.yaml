# Audit Fixture: Retry Scenario
# Scenario: First attempt writes incomplete file (fails acceptance),
#           retry writes correct file (passes).
# Run: python run_orchestrator.py run tests/fixtures/audit/retry_scenario.yaml

schema_version: "2.1"
id: AUDIT-RETRY-001
title: "Write validated output with retry correction"
description: >
  First attempt creates output with a known validation gap.
  Retry attempt produces the correct, complete output.
  Tests the verify→retry→pass loop.
assigned_role: backend
priority: medium
status: queued
domain: general

inputs:
  related_paths:
    - runtime/sessions/audit_retry.txt
  related_tests: []
  related_handoffs: []
  related_logs: []
  related_modules: []

constraints:
  - preserve_existing_api_contract

acceptance_criteria:
  - output file runtime/sessions/audit_retry.txt exists
  - file contains the string VALIDATED

metadata:
  fixture_type: retry_scenario
  expected_outcome: passed_after_retry
  expected_attempts: 2
  execution:
    primary_commands:
      - "New-Item -ItemType Directory -Path 'runtime/sessions' -Force | Out-Null; Set-Content -Path 'runtime/sessions/audit_retry.txt' -Value 'AUDIT-RETRY-001 draft — PENDING' -Encoding utf8"
    retry_commands:
      - "Set-Content -Path 'runtime/sessions/audit_retry.txt' -Value 'AUDIT-RETRY-001 final — VALIDATED' -Encoding utf8"
    output_files:
      - runtime/sessions/audit_retry.txt
    satisfied_criteria:
      - output file runtime/sessions/audit_retry.txt exists
    retry_satisfied_criteria:
      - output file runtime/sessions/audit_retry.txt exists
      - file contains the string VALIDATED
